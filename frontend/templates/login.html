<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — RepurposeAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/auth.css"/>
  <script src="https://kit.fontawesome.com/64d58efce2.js" crossorigin="anonymous"></script>
</head>
<body class="auth-page">

  <header class="auth-header">
    <div class="auth-logo">Repurpose<span>AI</span></div>
    <div class="auth-links">
      <a href="/signup" class="auth-legal-link">Create Account</a>
    </div>
  </header>

  <main class="auth-container">
    <div class="auth-form-wrapper">
      <div class="auth-card">
        <div class="auth-card-header">
          <div class="auth-card-icon-main"><i class="fas fa-microscope"></i></div>
          <h2 class="auth-card-title">Researcher Login</h2>
          <div class="auth-card-subtitle">Access Secure Research Portal</div>
        </div>

        <form action="/login" method="POST">
          <div class="auth-form-group">
            <label class="auth-label">Username</label>
            <div class="auth-input-wrapper">
              <input type="text" name="username" class="auth-input" placeholder="Enter username" required autofocus/>
              <i class="fas fa-user auth-input-icon"></i>
            </div>
          </div>

          <div class="auth-form-group">
            <label class="auth-label">Password</label>
            <div class="auth-input-wrapper">
              <input type="password" name="password" class="auth-input" placeholder="••••••••••••" required/>
              <i class="fas fa-lock auth-input-icon"></i>
            </div>
          </div>

          {% if error %}
          <div style="color: var(--danger); text-align:center; margin-bottom:16px; font-size:14px;">{{ error }}</div>
          {% endif %}

          <button type="submit" class="auth-submit-btn">Initialize Session</button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="/signup" class="auth-link">Request Access</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="auth-bottom-nav">
    <div class="auth-legal">
      <a href="#" class="auth-legal-link">Privacy Protocol</a>
      <a href="#" class="auth-legal-link">Terms of Research</a>
      <a href="#" class="auth-legal-link">Ethics Board</a>
      <a href="#" class="auth-legal-link">Contact Lab</a>
    </div>
    <div class="auth-copyright">
      © 2024 REPURPOSEAI. SYNTHETIC ALCHEMY FOR DRUG DISCOVERY.
    </div>
  </footer>

</body>
</html>
